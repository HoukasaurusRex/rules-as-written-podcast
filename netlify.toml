[build]
  base = 'astro-site'
  publish = 'dist'
  command = 'yarn build'
[build.environment]
  NODE_VERSION = '25'
[[redirects]]
  from = "/api/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/static/*.mp3"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
