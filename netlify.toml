[build]
  publish = 'dist'
  ignore = '/bin/true'
[[redirects]]
  from = "/api/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200
[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200
[[redirects]]
  from = "/api/party/*"
  to = "/.netlify/functions/party"
  status = 200
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/static/*.mp3"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/giscus-theme.css"
  [headers.values]
    Access-Control-Allow-Origin = "https://giscus.app"
