name: Build, Test & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - if: steps.cache-nm.outputs.cache-hit != 'true'
        run: yarn install

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - run: yarn check

      - run: yarn netlify build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          include-hidden-files: true
          retention-days: 1
          path: |
            dist/
            .netlify/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('**/yarn.lock') }}

      - run: yarn playwright install --with-deps chromium

      - uses: actions/download-artifact@v8
        with:
          name: build-output

      - name: Run e2e tests
        run: yarn test:e2e:ci
        env:
          BASE_URL: http://localhost:4173

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - uses: actions/download-artifact@v8
        with:
          name: build-output

      - name: Run production migrations
        run: yarn drizzle-kit migrate
        env:
          NETLIFY_DATABASE_URL_UNPOOLED: ${{ secrets.NETLIFY_DATABASE_URL_UNPOOLED }}

      - name: Deploy to Netlify
        run: yarn netlify deploy --no-build --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Create GitHub Deployment
        uses: actions/github-script@v8
        with:
          script: |
            const script = await import('${{ github.workspace }}/.github/scripts/create-deployment.mjs')
            await script.default({ github, context })

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - uses: actions/download-artifact@v8
        with:
          name: build-output

      - name: Get branch name
        id: branch-name
        run: echo "current_branch=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"

      - name: Create Neon database branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          database: neondb
          role: ${{ secrets.NEON_DATABASE_USERNAME }}
          branch_name: preview/pr-${{ github.event.number }}-${{ steps.branch-name.outputs.current_branch }}

      - name: Run Drizzle migrations
        run: yarn drizzle-kit migrate
        env:
          NETLIFY_DATABASE_URL_UNPOOLED: ${{ steps.create-branch.outputs.db_url }}

      - name: Seed preview database
        run: yarn db:seed
        env:
          NETLIFY_DATABASE_URL_UNPOOLED: ${{ steps.create-branch.outputs.db_url }}

      - name: Set preview DB URL on Netlify
        run: yarn netlify env:set PREVIEW_DATABASE_URL "$DB_URL"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          DB_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}

      - name: Deploy to Netlify
        run: yarn netlify deploy --no-build --alias="pr-${{ github.event.number }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Create GitHub Deployment
        uses: actions/github-script@v8
        with:
          script: |
            const previewUrl = `https://pr-${{ github.event.number }}--rules-as-written.netlify.app`
            const branchName = `preview/pr-${{ github.event.number }}-${{ steps.branch-name.outputs.current_branch }}`

            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: `preview-pr-${{ github.event.number }}`,
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false,
            })

            if (deployment.data.id) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.data.id,
                state: 'success',
                environment_url: previewUrl,
                log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              })
            }

            const body = [
              '## Deploy Preview Ready',
              '',
              `**Preview**: ${previewUrl}`,
              `**DB Branch**: \`${branchName}\``,
              '',
              '_Database branch will be cleaned up when this PR is closed._',
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            const botComment = comments.find(c => c.body?.includes('Deploy Preview Ready'))
            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              })
            }
