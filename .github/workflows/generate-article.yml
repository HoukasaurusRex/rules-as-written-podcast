name: Generate Article

on:
  workflow_dispatch:
    inputs:
      episode_number:
        description: 'Episode number (leave empty for latest)'
        required: false
        type: number
  repository_dispatch:
    types: [new-episode]

concurrency:
  group: generate-article
  cancel-in-progress: false

jobs:
  generate:
    name: Transcribe & Generate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - run: yarn install

      - name: Determine episode number
        id: episode
        run: |
          if [ -n "${{ inputs.episode_number }}" ]; then
            echo "args=${{ inputs.episode_number }}" >> "$GITHUB_OUTPUT"
            echo "number=${{ inputs.episode_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "args=" >> "$GITHUB_OUTPUT"
            echo "number=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate article
        run: yarn generate-article ${{ steps.episode.outputs.args }}
        env:
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KEILA_API_KEY: ${{ secrets.KEILA_API_KEY }}

      - name: Create PR with draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="article/ep-${{ steps.episode.outputs.number }}"
          git checkout -b "$BRANCH"
          git add src/content/episodes/
          git commit -m "feat: add draft article for episode ${{ steps.episode.outputs.number }}"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Draft: Episode ${{ steps.episode.outputs.number }} article" \
            --body "Auto-generated article and newsletter draft from podcast transcript. Review content and change status to Published when ready."
